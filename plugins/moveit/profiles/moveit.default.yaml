id: moveit.default
version: "0.1"
rules:
  joint_states:
    - /joint_states
  planning_scene:
    - /monitored_planning_scene
    - /planning_scene
  display_trajectory:
    - /display_planned_path
    - /trajectory_execution/display_planned_path

failure_recipes:
  moveit_joint_overspeed:
    symptoms:
      - joint_velocity_high
      - trajectory_active
    panels:
      - moveit.joint_states
      - moveit.joint_detail
      - moveit.trajectory

  moveit_scene_collision:
    symptoms:
      - scene_has_collisions
      - joint_motion_idle
    panels:
      - moveit.planning_scene
      - moveit.joint_states
