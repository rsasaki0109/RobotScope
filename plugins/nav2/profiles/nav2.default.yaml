id: nav2.default
version: "0.1"
rules:
  amcl_pose:
    - /amcl_pose
    - /odom
  global_costmap:
    - /global_costmap/costmap
    - /local_costmap/costmap
  global_plan:
    - /plan
    - /received_global_plan
  local_plan:
    - /local_plan
    - /transformed_global_plan
  goal:
    - /goal_pose
  cmd_vel:
    - /cmd_vel

failure_recipes:
  nav2_controller_stuck:
    symptoms:
      - local_plan_short
      - cmd_vel_stalled
      - goal_active
    panels:
      - nav2.local_plan
      - nav2.controller
      - nav2.goal

  nav2_localization_uncertainty:
    symptoms:
      - amcl_covariance_high
      - costmap_unknown_heavy
    panels:
      - nav2.amcl
      - nav2.costmap
