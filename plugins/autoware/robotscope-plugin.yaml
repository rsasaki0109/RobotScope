name: robotscope-autoware
version: 0.1.0
api: "0.1"
license: Apache-2.0
entrypoints:
  frontend: dist/frontend.js
capabilities:
  - read.entities
  - read.ros_graph
  - render.scene
  - register.panels
permissions:
  command.publish: false
  command.service_call: false
  network: false
contributes:
  panels:
    - autoware.localization
    - autoware.ndt_score
    - autoware.planning
    - autoware.control_error
    - autoware.gnss
    - autoware.map
  renderers:
    - lanelet2
    - perception_objects
  archetypes:
    - Lanelet2
    - AutowareNDTStatus
  layouts:
    - autoware
    - autoware-daily-debug
